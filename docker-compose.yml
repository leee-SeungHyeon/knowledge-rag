services:
  app:
    build: .
    image: knowledge-rag:dev
    container_name: knowledge-rag
    env_file:
      - .env
    environment:
      # Override paths for the container filesystem.
      # CHROMA_DIR is also set in the Dockerfile but kept here for clarity.
      CHROMA_DIR: /data/chroma_db
      NOTES_DIR: /notes
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - chroma_data:/data
      - ${NOTES_DIR:-./sample_notes}:/notes:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request, sys
          sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200 else 1)
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

volumes:
  chroma_data:
